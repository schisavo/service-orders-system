<div class="w-full max-w-md rounded-xl shadow-lg p-6">
    <form (ngSubmit)="save()" class="space-y-4">
        <textarea [(ngModel)]="order.description" name="description" placeholder="Descripción" class="w-full border p-2 rounded"></textarea>
        <select [(ngModel)]="order.status" name="status" class="w-full border p-2 rounded">
            <option value="Pendiente">Pendiente</option>
            <option value="En progreso">En progreso</option>
            <option value="Finalizada">Finalizada</option>
        </select>
        <input [(ngModel)]="order.technicianId" name="technicianId" placeholder="ID Técnico" class="w-full border p-2 rounded" />
        <input [(ngModel)]="order.clientId" name="clientId" placeholder="ID Cliente" class="w-full border p-2 rounded" />
        <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded">Guardar</button>
    </form>
</div>
