<div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">

    <div class="bg-white rounded-lg shadow-lg w-150 p-6">

        <h2 class="text-xl font-bold mb-4">
        {{ isEditMode ? 'Editar Orden' : 'Crear Orden' }}
        </h2>

        @if (loading) {
        <div class="mb-3 text-gray-500">Cargando datos...</div>
        }

        <form [formGroup]="orderForm" class="space-y-4">

        <!-- STATUS -->
        <div>
            <label class="block mb-1 font-medium text-gray-700">
            Estado
            </label>

            <select formControlName="status" class="w-full border p-2 rounded">
            <option value="Pendiente">Pendiente</option>
            <option value="En progreso">En progreso</option>
            <option value="Finalizada">Finalizada</option>
            </select>
        </div>

        <!-- DESCRIPTION -->
        <div>
            <label class="block mb-1 font-medium text-gray-700">
            Descripción
            </label>

            <textarea
            formControlName="description"
            class="w-full border p-2 rounded"
            rows="3">
            </textarea>
        </div>

        <!-- TECHNICIAN -->
        <div>
            <label class="block mb-1 font-medium text-gray-700">
            Técnico
            </label>

            <select formControlName="technicianId" class="w-full border p-2 rounded">
            <option value="">Selecciona un técnico</option>

            @for (t of technicians; track t.id) {
                <option [value]="t.id">
                {{ t.fullName }}
                </option>
            }
            </select>
        </div>

        <!-- CLIENT -->
        <div>
            <label class="block mb-1 font-medium text-gray-700">
            Cliente
            </label>

            <select formControlName="clientId" class="w-full border p-2 rounded">
            <option value="">Selecciona un cliente</option>

            @for (c of clients; track c.id) {
                <option [value]="c.id">
                {{ c.fullName }}
                </option>
            }
            </select>
        </div>

        </form>

        <!-- ACTIONS -->
        <div class="flex justify-end gap-2 mt-4">

            <button
                (click)="closeModal()"
                class="bg-gray-500 text-white px-4 py-2 rounded">
                Cancelar
            </button>

            <button
                (click)="save()"
                class="bg-blue-600 text-white px-4 py-2 rounded">
                {{ isEditMode ? 'Actualizar' : 'Guardar' }}
            </button>

        </div>

    </div>

</div>
