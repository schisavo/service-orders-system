<div *ngIf="loading">Cargando...</div>
<div *ngIf="errorMessage" class="text-red-600">{{errorMessage}}</div>

<table class="w-full border mt-4">
    <thead class="bg-slate-100">
        <tr>
        <th class="p-2">Fecha</th>
        <th class="p-2">Descripción</th>
        <th class="p-2">Estado</th>
        <th class="p-2">Acciones</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let order of orders" class="hover:bg-slate-50">
        <td class="p-2">{{order.createdAt | date}}</td>
        <td class="p-2">{{order.description}}</td>
        <td class="p-2">
            <span [class]="getBadgeClass(order.status)">
            {{order.status}}
            </span>
        </td>
        <td class="p-2">
            <button class="text-blue-600">Editar</button>
            <button (click)="deleteOrder(order.id)" class="text-red-600 ml-2">Eliminar</button>
        </td>
        </tr>
    </tbody>
</table>
