<div *ngIf="loading">Cargando...</div>
<div *ngIf="errorMessage" class="text-red-600">{{errorMessage}}</div>

<table class="w-full border mt-4">
    <thead class="bg-slate-100">
        <tr>
            <th class="p-2">Nombre</th>
            <th class="p-2">Documento</th>
            <th class="p-2">Teléfono</th>
            <th class="p-2">Acciones</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let client of clients" class="hover:bg-slate-50">
            <td class="p-2">{{client.fullName}}</td>
            <td class="p-2">{{client.documentNumber}}</td>
            <td class="p-2">{{client.phone}}</td>
            <td class="p-2">
                <button class="text-blue-600">Editar</button>
                <button (click)="deleteClient(client.id)" class="text-red-600 ml-2">Eliminar</button>
            </td>
        </tr>
    </tbody>
</table>
